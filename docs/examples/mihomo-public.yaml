rules:
  - RULE-SET,reject_adblock,REJECT
  - RULE-SET,reject_os_update,REJECT
  # 需要临时升级 Windows / macOS 时，可注释上一条拒绝规则，让后面的系统升级美国分流规则接管；系统时间同步仍由 os_time_direct 保持直连。
  - RULE-SET,reject_adspower,REJECT

  # `us_ai` 当前聚合海外 AI 平台并统一走美国节点；DeepSeek、Trae 中国大陆入口等国内 AI 不应并入这里，应优先交给 `direct_ai_cn`。
  - RULE-SET,us_google,🇺🇸 美国-自动选择
  - RULE-SET,us_ai,🇺🇸 美国-自动选择
  # Microsoft / macOS 更新放在 reject 之后、gfw 与普通 direct 之前；默认禁更时仍由上方拒绝规则先拦截。
  - RULE-SET,us_microsoft,🇺🇸 美国-自动选择
  - RULE-SET,us_macos_update,🇺🇸 美国-自动选择
  - RULE-SET,tw_crypto,🇨🇳 台湾-自动选择
  - RULE-SET,jp_domains,🇯🇵 日本-自动选择
  - RULE-SET,hk_telegram,🇭🇰 香港-自动选择
  # 复星证券、致富证券、辉立证券与富途相关入口并入这组。
  - RULE-SET,hk_brokers,🇭🇰 香港-自动选择
  # X / Twitter 网页、短链与静态资源，以及 Polymarket 相关域名并入这组。
  - RULE-SET,hk_global_media,🇭🇰 香港-自动选择

  # GitHub 仓库 SSH 定向直连必须放在 gfw 前，避免把整个 GitHub 放直连。
  - RULE-SET,direct_github_ssh,DIRECT

  # GitHub 核心 HTTPS 代理入口（网页 / API / Gist / Raw / 静态资源）；必须放在 gfw 前。
  - RULE-SET,proxy_github_core,🚀 节点选择

  # 旧版阿里云广覆盖观察兜底已弃用；阿里云香港 SSH、控制面与出口探测入口统一收敛到后面的直连段显式放行。

  # 4) AdsPower 细分直连（必须放在广谱代理前）
  - RULE-SET,direct_adspower,DIRECT

  # 5) AdsPower 细分节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_adspower,🚀 节点选择

  # 6) Polygon 主网 RPC 节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_polygon_rpc,🚀 节点选择

  # 7) BSC 主网 RPC 节点选择（必须放在 gfw 前）
  - RULE-SET,proxy_bsc_rpc,🚀 节点选择

  # 8) 海外 DNS 主 IPv4 端点美国分流（必须放在 gfw 前）
  - RULE-SET,proxy_overseas_dns_ipv4,🇺🇸 美国-自动选择,no-resolve

  # 9) 直连规则（先放系统时间同步，再接其他直连入口）
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,home.arpa,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - RULE-SET,direct_os_time,DIRECT
  # 阿里云 SSH 本地应急兜底必须放在远程 provider 前；即使远程缓存停留在残缺版本，也只放宽 TCP/22。
  - AND,((IP-CIDR,8.208.0.0/12,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-CIDR,47.76.0.0/16,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-CIDR,47.86.0.0/16,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-CIDR,47.238.0.0/15,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-CIDR,47.243.0.0/16,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-ASN,45102,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-ASN,134963,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - AND,((IP-ASN,24429,no-resolve),(NETWORK,tcp),(DST-PORT,22)),DIRECT
  - RULE-SET,direct_alicloud_hk_ipv4_ssh22,DIRECT,no-resolve
  - DOMAIN-SUFFIX,aliyuncs.com,DIRECT
  - DOMAIN,check.myclientip.com,DIRECT
  - RULE-SET,direct_ai_cn,DIRECT
  - RULE-SET,direct_bytedance,DIRECT
  - RULE-SET,direct_netease,DIRECT
  - RULE-SET,direct_bilibili,DIRECT
  - RULE-SET,direct_cn,DIRECT

  # 10) 代理优先（放在国内直连规则之后，避免国内域名被 gfw 广谱规则提前抢走）
  - RULE-SET,proxy_gfw,🚀 节点选择

  # 11) IP 规则
  - RULE-SET,hk_aws_ipv4,🇭🇰 香港-自动选择,no-resolve
  - RULE-SET,jp_tokyo_aws_ipv4,🇯🇵 日本-自动选择,no-resolve
  - RULE-SET,jp_osaka_aws_ipv4,🇯🇵 日本-自动选择,no-resolve
  - RULE-SET,kr_seoul_aws_ipv4,🇰🇷 韩国-自动选择,no-resolve
  - RULE-SET,tw_taipei_aws_ipv4,🇨🇳 台湾-自动选择,no-resolve
  # 多地区链式 SOCKS5 端点不再固定到日本组，统一交给自动选择。
  - RULE-SET,multi_chain_socks5_ipcidr,♻️ 自动选择,no-resolve

  # 12) 最终兜底
  # 极致体验默认回到总开关，不再把所有漏网流量固定锁在某个单一区域。
  - MATCH,🚀 节点选择

# 公开模板刻意不包含：
# 1. 真实机场订阅地址与供应商命名。
# 2. external-controller / secret 等控制面参数。
# 3. 按局域网源 IP 的设备分流。
# 4. 仅属于私有 Surge 工作路由文件的白名单 REJECT 结构。
